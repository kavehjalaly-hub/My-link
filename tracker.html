<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;color:white;text-align:center;padding:20px}
.container{max-width:350px;width:100%}
.wheel-container{position:relative;margin:20px auto;width:200px;height:200px}
.wheel{width:200px;height:200px;border-radius:50%;background:conic-gradient(#FF6B6B 0deg 60deg,#FFD93D 60deg 120deg,#6BCB77 120deg 180deg,#4D96FF 180deg 240deg,#FF6B6B 240deg 300deg,#FFD93D 300deg 360deg);border:5px solid gold;transition:transform 3s cubic-bezier(0.17,0.67,0.12,0.99)}
.wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:gold;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;z-index:10}
.pointer{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:30px;z-index:10}
h1{font-size:24px;color:gold;margin-bottom:10px}
.subtitle{color:#aaa;font-size:14px;margin-bottom:20px}
.btn{background:linear-gradient(135deg,#6C63FF,#FF6B6B);color:white;border:none;padding:15px 40px;border-radius:30px;font-size:16px;cursor:pointer;margin-top:20px;width:100%;font-weight:bold}
.result{display:none;animation:fadeIn 0.5s}
.result h2{font-size:28px;color:gold;margin-bottom:10px}
.result p{color:#aaa;margin-bottom:15px}
.prize{background:#16213e;border-radius:15px;padding:15px;margin:15px 0;border:2px solid gold}
.prize-icon{font-size:50px;margin-bottom:10px}
.prize-text{font-size:18px;color:gold;font-weight:bold}
.timer{font-size:14px;color:#aaa;margin-top:10px}
.timer span{color:#6C63FF;font-size:20px;font-weight:bold}
@keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
</style>
</head>
